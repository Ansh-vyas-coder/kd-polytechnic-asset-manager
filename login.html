<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - Smart Department Asset Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Spinner for login button */
        .spinner {
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            width: 16px; height: 16px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen w-full flex flex-col lg:flex-row antialiased bg-gray-50 overflow-x-hidden">

    <div class="hidden lg:flex w-1/2 bg-gradient-to-br from-blue-900 via-blue-800 to-blue-400 flex-col justify-center items-center p-8 relative overflow-hidden">
        
        <div class="absolute inset-0 opacity-[0.04]" 
             style="background-image: radial-gradient(#ffffff 2px, transparent 2px); background-size: 30px 30px;">
        </div>

        <svg class="absolute inset-y-0 right-0 h-full w-48 text-gray-50 z-0 pointer-events-none transform translate-x-1" viewBox="0 0 100 100" preserveAspectRatio="none">
            <path d="M30,0 C70,25 20,75 50,100 L100,100 L100,0 Z" fill="currentColor" opacity="0.15"></path>
            <path d="M50,0 C90,30 40,70 70,100 L100,100 L100,0 Z" fill="currentColor" opacity="0.4"></path>
            <path d="M70,0 C110,40 60,65 90,100 L100,100 L100,0 Z" fill="currentColor"></path>
        </svg>

        <div class="relative z-10 flex flex-col items-center text-center max-w-lg">
            <div class="w-32 h-32 xl:w-40 xl:h-40 bg-white rounded-2xl flex items-center justify-center mb-6 shadow-2xl overflow-hidden p-4">
                <img 
                    src="https://scontent.famd8-1.fna.fbcdn.net/v/t39.30808-6/482345949_1144079087415361_6640568596786112832_n.jpg?stp=dst-jpg_tt6&cstp=mx1379x1379&ctp=s1379x1379&_nc_cat=111&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=dqzfFwO_7hEQ7kNvwHlS2Lc&_nc_oc=AdqNTZYLxmQKL2WaL9V7X7C6O9y9HIZNlpZiBqOTr3chZ-WT57nGAbpKFdbH0IayXk4&_nc_zt=23&_nc_ht=scontent.famd8-1.fna&_nc_gid=512jtex-NyXTQ9YEE2yRCg&_nc_ss=7b289&oh=00_AQCFoi8YrRQThI_Qg2e3SPWGXJTNIXX5tSQO7LOxr-Rw5w&oe=6A5E8523" 
                    alt="K.D. Polytechnic Logo" 
                    class="w-full h-full object-contain"
                >
            </div>
            
            <h1 class="text-2xl xl:text-3xl font-extrabold text-white tracking-tight leading-tight drop-shadow-md">
                K.D. Polytechnic, Patan
            </h1>
            <p class="text-base xl:text-lg font-semibold text-blue-200 mt-2 tracking-wide">
                Smart Department Asset Manager
            </p>
            <p class="text-xs xl:text-sm text-blue-100/90 mt-3 max-w-sm mx-auto leading-relaxed">
                Secure enterprise portal for tracking and managing departmental resources.
            </p>
        </div>
    </div>

    <div class="w-full lg:w-1/2 flex flex-col items-center justify-center p-4 sm:p-8 lg:p-12 relative z-10 min-h-screen lg:min-h-0">
        
        <div class="flex lg:hidden flex-col items-center text-center mb-8 mt-4">
            <div class="w-24 h-24 bg-white rounded-2xl flex items-center justify-center mb-4 shadow-lg overflow-hidden p-3 border border-gray-100">
                <img 
                    src="https://scontent.famd8-1.fna.fbcdn.net/v/t39.30808-6/482345949_1144079087415361_6640568596786112832_n.jpg?stp=dst-jpg_tt6&cstp=mx1379x1379&ctp=s1379x1379&_nc_cat=111&ccb=1-7&_nc_sid=6ee11a&_nc_ohc=dqzfFwO_7hEQ7kNvwHlS2Lc&_nc_oc=AdqNTZYLxmQKL2WaL9V7X7C6O9y9HIZNlpZiBqOTr3chZ-WT57nGAbpKFdbH0IayXk4&_nc_zt=23&_nc_ht=scontent.famd8-1.fna&_nc_gid=512jtex-NyXTQ9YEE2yRCg&_nc_ss=7b289&oh=00_AQCFoi8YrRQThI_Qg2e3SPWGXJTNIXX5tSQO7LOxr-Rw5w&oe=6A5E8523" 
                    alt="K.D. Polytechnic Logo" 
                    class="w-full h-full object-contain"
                >
            </div>
            <h1 class="text-xl font-extrabold text-gray-900 tracking-tight">
                K.D. Polytechnic, Patan
            </h1>
            <p class="text-sm font-semibold text-blue-600 mt-1">
                Asset Manager Portal
            </p>
        </div>

        <div class="w-full max-w-md bg-white rounded-2xl shadow-xl lg:shadow-2xl hover:shadow-blue-500/10 transition-shadow duration-300 p-6 sm:p-8 relative z-20 flex flex-col border border-gray-100/80 mx-auto">
            
            <div class="mb-6 xl:mb-8">
                <h2 class="text-2xl xl:text-3xl font-extrabold text-gray-900 tracking-tight">
                    Welcome Back
                </h2>
                <p class="mt-2 text-sm text-gray-500 font-medium">
                    Please enter your credentials to access the portal.
                </p>
            </div>

            <form id="loginForm" class="space-y-4 xl:space-y-5 flex-grow w-full" action="login.php" method="POST">
                
                <div class="w-full">
                    <label for="email" class="block text-sm font-semibold text-gray-700 mb-1.5">
                        Email address
                    </label>
                    <div class="relative w-full">
                        <input 
                            id="email" 
                            name="email" 
                            type="email" 
                            autocomplete="email" 
                            required
                            class="appearance-none block w-full px-4 py-2.5 xl:py-3 bg-gray-50 border border-gray-200 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 text-sm font-medium text-gray-900 box-border"
                            placeholder="admin@example.com"
                        >
                    </div>
                </div>

                <div class="w-full">
                    <label for="password" class="block text-sm font-semibold text-gray-700 mb-1.5">
                        Password
                    </label>
                    <div class="relative w-full">
                        <input 
                            id="password" 
                            name="password" 
                            type="password" 
                            autocomplete="current-password" 
                            required
                            class="appearance-none block w-full px-4 py-2.5 xl:py-3 bg-gray-50 border border-gray-200 rounded-lg shadow-sm placeholder-gray-400 focus:outline-none focus:bg-white focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all duration-200 text-sm font-medium text-gray-900 pr-12 box-border"
                            placeholder="••••••••"
                        >
                        <div class="absolute inset-y-0 right-0 pr-3 flex items-center text-sm leading-5">
                            <button type="button" id="togglePassword" class="p-1 text-gray-400 hover:text-blue-600 focus:outline-none transition-colors duration-200">
                                <svg id="eyeIcon" class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639l4.43-4.43a1.012 1.012 0 011.43 0l4.43 4.43a1.012 1.012 0 010 .639l-4.43 4.43a1.012 1.012 0 01-1.43 0l-4.43-4.43z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                                <svg id="eyeSlashIcon" class="h-5 w-5 hidden" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.774 3.162 10.066 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.243 4.243L6.228 6.228" />
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>

                <div class="flex flex-row items-center justify-between pt-1 w-full gap-2">
                    <div class="flex items-center">
                        <input id="remember-me" name="remember-me" type="checkbox" class="w-4 h-4 text-blue-600 rounded focus:ring-blue-500 border-gray-300 transition duration-150 ease-in-out cursor-pointer flex-shrink-0">
                        <label for="remember-me" class="ml-2 block text-xs sm:text-sm text-gray-600 font-medium cursor-pointer whitespace-nowrap">
                            Remember me
                        </label>
                    </div>
                    <div class="text-xs sm:text-sm text-right">
                        <a href="#" class="font-semibold text-blue-600 hover:text-blue-500 transition-colors duration-200 whitespace-nowrap">
                            Forgot Password?
                        </a>
                    </div>
                </div>

                <div class="pt-3 xl:pt-4 w-full">
                    <button 
                        type="submit" 
                        id="loginBtn"
                        class="w-full flex justify-center py-2.5 xl:py-3 px-4 border border-transparent rounded-lg shadow-md text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 hover:shadow-lg hover:shadow-blue-500/40 hover:-translate-y-0.5 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-600 transition-all duration-300"
                    >
                        <span class="btn-text">Login</span>
                    </button>
                </div>
                <div id="error-message" class="hidden text-center text-sm font-medium text-red-500 pt-2">
                    <!-- Error messages will be inserted here -->
                </div>
            </form>
        </div>
        
        <div class="h-8 lg:hidden"></div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const togglePassword = document.getElementById('togglePassword');
            const password = document.getElementById('password');
            const eyeIcon = document.getElementById('eyeIcon');
            const eyeSlashIcon = document.getElementById('eyeSlashIcon');

            togglePassword.addEventListener('click', function (e) {
                const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
                password.setAttribute('type', type);
                
                if (type === 'password') {
                    eyeIcon.classList.remove('hidden');
                    eyeSlashIcon.classList.add('hidden');
                } else {
                    eyeIcon.classList.add('hidden');
                    eyeSlashIcon.classList.remove('hidden');
                }
            });

            // --- New Login and Transition Logic ---
            const loginForm = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const btnText = loginBtn.querySelector('.btn-text');
            const errorMessageDiv = document.getElementById('error-message');

            loginForm.addEventListener('submit', function(event) {
                event.preventDefault(); // Stop the default form submission

                // Show loading state
                loginBtn.disabled = true;
                btnText.innerHTML = '<div class="spinner"></div>';
                errorMessageDiv.classList.add('hidden');

                const formData = new FormData(loginForm);

                fetch('login.php', {
                    method: 'POST',
                    body: formData
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        // On success, redirect immediately to the dashboard
                        window.location.href = 'dashboard.php';
                    } else {
                        // On failure, show the error message
                        errorMessageDiv.textContent = data.message || 'An error occurred.';
                        errorMessageDiv.classList.remove('hidden');
                        // Restore button
                        loginBtn.disabled = false;
                        btnText.textContent = 'Login';
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    errorMessageDiv.textContent = 'Request failed. Please try again.';
                    errorMessageDiv.classList.remove('hidden');
                    // Restore button
                    loginBtn.disabled = false;
                    btnText.textContent = 'Login';
                });
            });
        });
    </script>
</body>
</html>
